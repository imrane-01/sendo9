<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصندوق</title>
<style>
  :root{
    --bg: #1b1410;
    --wood: #6b4226;
    --wood-dark: #4a2c18;
    --gold: #d4a64a;
    --gold-light: #f1cd7e;
    --cream: #f4ead6;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 50% 30%, #2a1f18, var(--bg) 70%);
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    overflow:hidden;
  }

  .scene{
    text-align:center;
    position:relative;
  }

  .hint{
    color: var(--gold-light);
    font-size: 1.1rem;
    margin-bottom: 30px;
    opacity:0.85;
    letter-spacing: 0.5px;
  }

  .box-wrap{
    position:relative;
    width:220px;
    height:160px;
    margin:0 auto;
    cursor:pointer;
    perspective: 800px;
  }

  .lid{
    position:absolute;
    top:0; left:0;
    width:100%;
    height:55px;
    background: linear-gradient(160deg, var(--gold-light), var(--wood));
    border: 3px solid var(--wood-dark);
    border-radius: 8px;
    z-index: 3;
    transform-origin: top;
    transition: transform 0.6s cubic-bezier(.2,.8,.3,1.4);
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  .lid::after{
    content:"";
    position:absolute;
    bottom:-10px; left:50%;
    transform: translateX(-50%);
    width:34px; height:20px;
    background: var(--gold);
    border-radius: 6px;
    border: 2px solid var(--wood-dark);
  }

  .base{
    position:absolute;
    bottom:0; left:0;
    width:100%;
    height:110px;
    background: linear-gradient(160deg, var(--wood), var(--wood-dark));
    border: 3px solid var(--wood-dark);
    border-radius: 6px;
    z-index:1;
    overflow:hidden;
  }

  .base::before{
    content:"";
    position:absolute;
    inset:8px;
    border: 2px dashed rgba(212,166,74,0.35);
    border-radius: 4px;
  }

  .glow{
    position:absolute;
    bottom:6px; left:50%;
    transform: translateX(-50%) scale(0);
    width:140px; height:60px;
    background: radial-gradient(ellipse at center, rgba(241,205,126,0.9), transparent 70%);
    z-index:2;
    transition: transform 0.4s ease 0.3s;
    border-radius:50%;
  }

  .box-wrap.open .lid{
    transform: rotateX(-115deg) translateY(-10px);
  }

  .box-wrap.open .glow{
    transform: translateX(-50%) scale(1);
  }

  .message{
    margin-top: 40px;
    max-width: 480px;
    font-size: 1.5rem;
    color: var(--cream);
    line-height: 1.9;
    opacity:0;
    transform: translateY(15px);
    transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
    font-weight: 600;
  }

  .message span{
    display:block;
    color: var(--gold-light);
    font-size: 1.1rem;
    margin-top:10px;
    font-weight:400;
  }

  .box-wrap.open + .message,
  .message.show{
    opacity:1;
    transform: translateY(0);
  }

  .again{
    margin-top:25px;
    display:inline-block;
    background:none;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 8px 22px;
    border-radius: 30px;
    font-size: 0.95rem;
    cursor:pointer;
    opacity:0;
    transition: opacity 0.5s ease 0.8s, background 0.2s;
    font-family: inherit;
  }

  .again.show{ opacity:1; }
  .again:hover{ background: rgba(212,166,74,0.15); }
</style>
</head>
<body>

<div class="scene">
  <div class="hint">دوس على الصندوق...</div>
  <div class="box-wrap" id="boxWrap">
    <div class="glow"></div>
    <div class="base"></div>
    <div class="lid"></div>
  </div>
  <div class="message" id="message">
    يا واق! هادا هو داكشي اللي كنتي كتقول ليا العام كامل 😏
    <span>الصندوق ما يكذبش</span>
  </div>
  <button class="again" id="againBtn">حل الصندوق مرة أخرى</button>
</div>

<script>
  const boxWrap = document.getElementById('boxWrap');
  const message = document.getElementById('message');
  const againBtn = document.getElementById('againBtn');

  function openBox(){
    boxWrap.classList.add('open');
    message.classList.add('show');
    againBtn.classList.add('show');
  }

  function resetBox(){
    boxWrap.classList.remove('open');
    message.classList.remove('show');
    againBtn.classList.remove('show');
  }

  boxWrap.addEventListener('click', () => {
    if(!boxWrap.classList.contains('open')) openBox();
  });

  againBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    resetBox();
    setTimeout(openBox, 250);
  });
</script>

</body>
</html>
